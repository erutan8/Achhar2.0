<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achhar | Heritage & Collection</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { spice: '#9c2a1a', cream: '#f5f2ed', charcoal: '#1f1a17', amber: '#d68b33' },
                    fontFamily: { display: ['Playfair Display', 'serif'], body: ['DM Sans', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f5f2ed; overflow-x: hidden; }
        .nav-scrolled { background-color: #1a0c00 !important; padding: 1rem 2.5rem !important; }
        
        /* The jar pieces */
        .jar-part { position: absolute; left: 50%; transform: translateX(-50%); width: 100%; }
        
        /* Crucial: prevents the lid/body from being cut during animation */
        #explode-section, .pin-spacer { overflow: visible !important; }
    </style>
</head>
<body class="font-body text-charcoal">

    <nav id="main-nav" class="fixed w-full z-50 px-10 py-8 flex justify-between items-center text-white transition-all duration-500">
        <div class="text-2xl font-display font-black tracking-tighter">ACHHAR.</div>
        <div class="hidden md:flex gap-10 text-[10px] font-bold uppercase tracking-[0.2em]">
            <a href="#">Home</a>
            <a href="#about">About</a>
            <a href="#product">Collection</a>
        </div>
    </nav>

    <section id="about" class="h-screen bg-white flex items-center justify-center text-center px-10">
        <div>
            <h2 class="font-display text-6xl md:text-8xl italic mb-6">Born in Himalayas</h2>
            <p class="max-w-xl mx-auto text-lg opacity-70">Heritage recipes passed down through generations, crafted with purity and fire.</p>
        </div>
    </section>

    <section id="explode-section" class="relative bg-white">
        <div id="pin-container" class="h-screen w-full flex flex-col items-center justify-center sticky top-0 overflow-visible">
            
            <div id="reveal-text" class="absolute z-0 text-center opacity-0 pointer-events-none">
                <h2 class="font-display text-7xl md:text-[12rem] text-white/10 uppercase font-black leading-none">Spicy Chicken</h2>
            </div>

            <div class="relative w-80 h-[600px] md:w-[480px] flex items-center justify-center transform translate-y-32 overflow-visible">
                
                <img src="lid.png" id="jar-lid" class="jar-part z-30" style="top: -40px;" alt="Lid">
                
                <div id="spices-wrap" class="absolute inset-0 z-20 opacity-0 scale-50 pointer-events-none">
                    <img src="chili.png" class="absolute top-40 left-0 w-24 rotate-12" alt="Chili">
                    <img src="garlic.png" class="absolute top-52 right-0 w-20 -rotate-12" alt="Garlic">
                </div>

                <img src="base0.png" id="jar-body" class="jar-part z-10" style="bottom: 0px;" alt="Body">
            </div>

            <div id="side-info" class="absolute bottom-10 left-10 md:left-20 max-w-sm opacity-0">
                <h4 class="text-spice font-bold uppercase text-[10px] tracking-widest mb-2">The Secret</h4>
                <p class="text-charcoal italic text-xl md:text-2xl transition-colors duration-500" id="info-p">Sun-dried chilies mixed with 100% organic local chicken.</p>
            </div>
        </div>

        <div class="h-[250vh]"></div>
    </section>

    <section id="product" class="py-32 bg-black text-white px-10 text-center min-h-screen">
        <h2 class="font-display text-6xl md:text-8xl italic mb-12">The Collection</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-6xl mx-auto opacity-50">
            <div class="h-80 bg-white/10 rounded-lg"></div>
            <div class="h-80 bg-white/10 rounded-lg"></div>
            <div class="h-80 bg-white/10 rounded-lg"></div>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Exploding Jar Timeline
        const jarTl = gsap.timeline({
            scrollTrigger: {
                trigger: "#explode-section",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.2,
                pin: "#pin-container",
            }
        });

        jarTl
          // 1. Background fades to black to match the next section
          .to("#explode-section", { backgroundColor: "#000000", duration: 2 }, 0)
          
          // 2. Lid flies up out of view and fades out
          .to("#jar-lid", { y: -600, rotation: 15, scale: 0.6, opacity: 0, duration: 4 }, 0)

          // 3. Spices and text reveal
          .to("#reveal-text", { opacity: 1, scale: 1.1, duration: 2 }, 1)
          .to("#spices-wrap", { opacity: 1, scale: 1.3, y: -150, duration: 3 }, 1)

          // 4. Side info appears and text turns white
          .to("#side-info", { opacity: 1, y: -20, duration: 2 }, 1.5)
          .to("#info-p", { color: "#ffffff", duration: 1 }, 1.5)

          // 5. Jar body sinks down slightly for depth
          .to("#jar-body", { y: 150, scale: 0.9, duration: 3 }, 1);

        // Navbar Interaction
        const nav = document.querySelector('#main-nav');
        window.addEventListener('scroll', () => {
            window.scrollY > 100 ? nav.classList.add('nav-scrolled') : nav.classList.remove('nav-scrolled');
        });
    </script>
</body>
</html>
