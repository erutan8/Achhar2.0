<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-S6GGZ91XQ3"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achhar Lab | 6s Custom Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { spice: '#9c2a1a', charcoal: '#0a0a0a', amber: '#d68b33' },
                    fontFamily: { display: ['Playfair Display', 'serif'], body: ['DM Sans', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0a0a0a; margin: 0; display: flex; flex-direction: column; height: 100vh; height: 100svh; overflow: hidden; font-family: 'DM Sans', sans-serif; }
        header { height: 60px; md:height: 70px; flex-shrink: 0; position: relative; z-index: 100; }
        footer { display: none; md:flex; height: 40px; flex-shrink: 0; position: relative; z-index: 100; }

        .main-stage { position: relative; flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }

        .video-wrapper { position: absolute; inset: 0; z-index: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.8s ease-in-out; }

        /* Desktop Sidebar Mask */
        .sidebar-mask {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 500px;
            z-index: 5;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        /* Mobile Bottom Gradient Mask */
        @media (max-width: 768px) {
            .sidebar-mask {
                width: 100%; height: 60%; top: auto; bottom: 0;
                background: linear-gradient(to top, rgba(0,0,0,1) 20%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0) 100%);
            }
        }

        /* Container for Desktop/Mobile */
        .sidebar-container {
            position: absolute;
            z-index: 10;
            left: 40px; top: 50%; transform: translateY(-50%);
            width: 320px;
        }

        @media (max-width: 768px) {
            .sidebar-container {
                left: 0; top: auto; bottom: 180px; transform: none;
                width: 100%; padding: 0 20px;
            }
            #product-list {
                display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px;
                scrollbar-width: none; -ms-overflow-style: none;
            }
            #product-list::-webkit-scrollbar { display: none; }
            .lab-btn { flex-shrink: 0; width: 140px; margin-bottom: 0 !important; padding: 12px !important; }
            .lab-btn span { font-size: 0.75rem !important; }
        }

        .lab-btn {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 0.75rem;
            pointer-events: auto;
        }

        .lab-btn.active {
            background: #9c2a1a;
            border-color: #d68b33;
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(156, 42, 26, 0.4);
        }

        @media (max-width: 768px) { .lab-btn.active { transform: translateY(-5px); } }

        #info-panel {
            position: absolute;
            right: 30px; bottom: 30px;
            z-index: 20; width: 300px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem; border-radius: 1.5rem; opacity: 0;
        }

        @media (max-width: 768px) {
            #info-panel {
                right: 20px; left: 20px; bottom: 20px; width: auto;
                padding: 1.2rem; border-radius: 1rem;
            }
        }

        .glass-nav { background: #1a0c00; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        #cart-drawer {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 350px; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(30px);
            z-index: 200; border-left: 1px solid rgba(214, 139, 51, 0.3);
            padding: 2rem; display: flex; flex-direction: column;
        }

        .timer-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 30; }
        #timer-progress { height: 100%; width: 0%; background: #9c2a1a; }
    </style>
</head>
<body>

    <header class="glass-nav flex items-center justify-between px-6 md:px-10">
        <div class="text-xl font-display font-black tracking-tighter text-spice">ACHHAR.</div>
        <div class="flex items-center gap-4 md:gap-8">
            <nav class="hidden md:flex gap-6 text-[9px] font-bold uppercase tracking-[0.2em] text-white">
                <a href="index.html" class="hover:text-amber transition-colors">Home</a>
                <a href="story.html" class="hover:text-amber transition-colors">Story</a>
            </nav>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <div id="cart-counter" class="absolute -top-2 -right-2 bg-spice text-white text-[8px] w-4 h-4 flex items-center justify-center rounded-full border border-amber/30 scale-0 transition-transform">0</div>
                <svg id="cart-icon" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                </svg>
            </div>
        </div>
    </header>

    <div id="cart-drawer">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-display text-2xl text-white italic">Your Selection</h2>
            <button onclick="toggleCart()" class="text-white/50 hover:text-white text-xs uppercase tracking-widest">Close</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 pr-2"></div>
        <div class="mt-6 pt-6 border-t border-white/10">
            <div class="flex justify-between text-white mb-4">
                <span class="text-xs uppercase tracking-widest opacity-60">Total</span>
                <span id="cart-total" class="font-bold text-amber">Rs. 0</span>
            </div>
            <button onclick="checkoutToWhatsApp()" class="w-full py-4 bg-white text-charcoal text-[10px] font-bold uppercase tracking-widest rounded-lg hover:bg-spice hover:text-white transition-all">
                Checkout via WhatsApp
            </button>
        </div>
    </div>

    <main class="main-stage">
        <div class="sidebar-mask"></div>
        <div class="video-wrapper">
            <video id="lab-video" muted playsinline style="opacity: 0;"></video>
            <div class="timer-bar-container">
                <div id="timer-progress"></div>
            </div>
        </div>

        <div class="sidebar-container">
            <h4 class="text-amber uppercase tracking-[0.5em] font-bold text-[9px] mb-4 md:mb-6 px-1 md:px-0">The Collection</h4>
            <div id="product-list"></div>
        </div>

        <div id="info-panel">
            <div class="flex justify-between items-start mb-2">
                <h3 id="item-title" class="font-display text-lg md:text-xl text-white italic">Title</h3>
                <span id="item-price" class="text-amber font-bold text-xs">Rs. 0</span>
            </div>
            <p id="item-desc" class="text-gray-300 text-[10px] md:text-[11px] leading-snug mb-4">Description...</p>
            <button id="add-to-cart-btn" class="relative overflow-hidden w-full py-3 bg-spice text-white text-[10px] font-bold uppercase tracking-widest rounded-lg active:scale-95 transition-transform">
                <span id="btn-text" class="relative z-10">Add to Basket</span>
                <div id="btn-success-bg" class="absolute inset-0 bg-amber translate-y-full transition-transform duration-300"></div>
            </button>
        </div>
    </main>

    <footer class="bg-charcoal flex items-center justify-center border-t border-white/5">
        <p class="text-[8px] text-white/20 uppercase tracking-[0.5em]">© 2026 Achhar Traditional Nepali Spices</p>
    </footer>

    <script>
        const PRODUCTS = [
            { id: 'classic', title: 'Classic Spicy', price: 450, desc: 'Hand-torn chicken in Akabare chili oil.', videoSrc: 'video1.mp4' },
            { id: 'timur', title: 'Timur Special', price: 350, desc: 'Citrusy zing from wild-harvested Timur.', videoSrc: 'video2.mp4' },
            { id: 'garlic', title: 'Smoked Garlic', price: 390, desc: 'Roasted garlic with slow-smoked flakes.', videoSrc: 'videos/video3.mp4' },
            { id: 'lemon', title: 'Our Signature', price: 590, desc: 'Tangy preserved lemons and mild heat.', videoSrc: 'videos/lemon.mp4' },
            { id: 'akabare', title: 'Akabare Fire', price: 450, desc: 'Legendary Ghost Chili. Maximum heat.', videoSrc: 'videos/akabare.mp4' },
            { id: 'herbal', title: 'Festive Fire', price: 520, desc: 'Earthy mountain herbs and Jimbu.', videoSrc: 'videos/herbal.mp4' }
        ];

        let cart = [];
        let currentProduct = PRODUCTS[0];
        let isCartOpen = false;
        let playTimeout;

        const productList = document.getElementById('product-list');
        const video = document.getElementById('lab-video');
        const infoPanel = document.getElementById('info-panel');
        const progressBar = document.getElementById('timer-progress');
        const cartCounter = document.getElementById('cart-counter');
        const cartDrawer = document.getElementById('cart-drawer');

        PRODUCTS.forEach((p) => {
            const btn = document.createElement('button');
            btn.className = `lab-btn flex items-center justify-between px-5 py-4 rounded-xl text-white opacity-70`;
            btn.id = `btn-${p.id}`;
            btn.innerHTML = `<span class="font-display text-sm md:text-base font-medium tracking-wide">${p.title}</span>`;
            
            btn.onclick = () => {
                currentProduct = p;
                clearTimeout(playTimeout);
                gsap.killTweensOf(progressBar);
                document.querySelectorAll('.lab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Responsive Scroll into view for mobile
                if(window.innerWidth < 768) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

                gsap.to(infoPanel, { opacity: 0, y: 10, duration: 0.2, onComplete: () => {
                    document.getElementById('item-title').innerText = p.title;
                    document.getElementById('item-desc').innerText = p.desc;
                    document.getElementById('item-price').innerText = `Rs. ${p.price}`;
                    gsap.to(infoPanel, { opacity: 1, y: 0, duration: 0.4 });
                }});

                video.style.opacity = 0;
                setTimeout(() => {
                    video.src = p.videoSrc;
                    video.load();
                    video.play().then(() => {
                        video.style.opacity = 1;
                        gsap.fromTo(progressBar, { width: "0%" }, { width: "100%", duration: 6, ease: "none" });
                        playTimeout = setTimeout(() => { video.pause(); video.style.opacity = 0.4; }, 6000);
                    }).catch(e => console.log("Video Load Error"));
                }, 400); 
            };
            productList.appendChild(btn);
        });

        document.getElementById('add-to-cart-btn').onclick = function() {
            cart.push(currentProduct);
            updateCartUI();
            
            const successBg = document.getElementById('btn-success-bg');
            const btnText = document.getElementById('btn-text');
            gsap.to(successBg, { translateY: 0, duration: 0.3 });
            btnText.innerText = "ADDED!";
            setTimeout(() => {
                gsap.to(successBg, { translateY: '100%', duration: 0.3 });
                btnText.innerText = "ADD TO BASKET";
            }, 1500);

            // Flying Particle
            const particle = document.createElement('div');
            particle.className = "fixed z-[500] w-4 h-4 bg-amber rounded-full shadow-[0_0_20px_#d68b33]";
            document.body.appendChild(particle);
            const start = this.getBoundingClientRect();
            const end = document.getElementById('cart-icon').getBoundingClientRect();
            gsap.set(particle, { x: start.left + start.width/2, y: start.top });
            gsap.to(particle, {
                x: end.left, y: end.top, scale: 0.2, opacity: 0, duration: 0.8, ease: "power2.inOut",
                onComplete: () => { particle.remove(); gsap.fromTo(cartCounter, { scale: 1.5 }, { scale: 1, duration: 0.4 }); }
            });
        };

        function updateCartUI() {
            cartCounter.innerText = cart.length;
            if(cart.length > 0) gsap.to(cartCounter, { scale: 1, duration: 0.3 });
            const list = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white/5 p-4 rounded-lg border border-white/10";
                div.innerHTML = `<div><p class="text-white text-xs font-bold uppercase">${item.title}</p><p class="text-amber text-[10px]">Rs. ${item.price}</p></div><button onclick="removeFromCart(${index})" class="text-white/30 text-[10px]">Remove</button>`;
                list.appendChild(div);
            });
            totalDisplay.innerText = `Rs. ${total}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
            if(cart.length === 0) gsap.to(cartCounter, { scale: 0, duration: 0.3 });
        }

        function toggleCart() {
            isCartOpen = !isCartOpen;
            gsap.to(cartDrawer, { right: isCartOpen ? 0 : "-100%", duration: 0.6, ease: "expo.out" });
        }

        function checkoutToWhatsApp() {
            if (cart.length === 0) return alert("Basket is empty!");
            const phoneNumber = "9764340707";
            const itemCounts = {};
            let total = 0;
            cart.forEach(item => { itemCounts[item.title] = (itemCounts[item.title] || 0) + 1; total += item.price; });
            let message = `Namaste Achhar! Order from Lab:\n\n`;
            for (const [title, count] of Object.entries(itemCounts)) { message += `• ${count}x ${title}\n`; }
            message += `\nTotal: Rs. ${total}\nConfirm please!`;
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.onload = () => productList.firstChild.click();
    </script>
</body>
</html>
